<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --ink: #0c0f0e;
        --panel: #151713;
        --panel-2: #1b1e18;
        --line: #303329;
        --line-soft: #242820;
        --text: #d9d2c2;
        --muted: #82877b;
        --faint: #62685d;
        --brass: #ad9259;
        --brass-soft: #332b19;
        --teal: #7fb7a7;
        --teal-soft: #132723;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--ink);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .app-shell {
        background:
          linear-gradient(180deg, rgba(195, 161, 95, 0.035), transparent 220px),
          var(--ink);
      }

      .surface {
        background: var(--panel);
        border: 1px solid var(--line-soft);
      }

      .surface-raised {
        background: var(--panel-2);
        border: 1px solid var(--line);
      }

      .hairline {
        border-color: var(--line-soft);
      }

      .muted {
        color: var(--muted);
      }

      .faint {
        color: var(--faint);
      }

      .accent {
        color: var(--brass);
      }

      .field {
        background: #0f1210;
        border: 1px solid var(--line);
        color: var(--text);
        outline: none;
      }

      .field:focus {
        border-color: rgba(195, 161, 95, 0.72);
        box-shadow: 0 0 0 1px rgba(195, 161, 95, 0.18);
      }

      .nav-item {
        color: var(--muted);
        border: 1px solid transparent;
      }

      .nav-item:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.025);
      }

      .nav-item-active {
        color: var(--text);
        background: var(--brass-soft);
        border-color: rgba(195, 161, 95, 0.35);
      }

      .scrollbar-thin::-webkit-scrollbar {
        width: 7px;
      }

      .scrollbar-thin::-webkit-scrollbar-track {
        background: transparent;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #3c4137;
        border-radius: 999px;
      }

      .mono {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
      {% raw %}
      const { useEffect, useMemo, useRef, useState } = React;

      const formatTime = (iso, opts = {}) => {
        if (!iso) return "unknown";
        try {
          const normalized = iso.endsWith("Z") ? iso : `${iso}Z`;
          return new Date(normalized).toLocaleString([], {
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            ...(opts.seconds ? { second: "2-digit" } : {}),
            hour12: false,
          });
        } catch {
          return "unknown";
        }
      };

      const autoResize = (el) => {
        if (!el) return;
        el.style.height = "auto";
        el.style.height = `${Math.min(el.scrollHeight, 180)}px`;
      };

      const parseActionEntry = (event) => {
        try {
          return JSON.parse(event?.data?.entry || "{}");
        } catch {
          return {};
        }
      };

      const isErrorEntry = (entry) => {
        const status = entry?.status || "";
        const results = entry?.results || {};
        const reasoning = entry?.reasoning || "";
        return (
          ["error", "failed", "self_correcting", "interrupted"].includes(status) ||
          results.status === "error" ||
          results.status === "failed" ||
          Boolean(results.error) ||
          (typeof reasoning === "string" && reasoning.startsWith("Error:"))
        );
      };

      const getErrorMessage = (entry) => {
        const results = entry?.results || {};
        if (results.error) return results.error;
        if (results.message) return results.message;
        if (entry?.reasoning?.startsWith("Error:")) return entry.reasoning;
        return "No explicit error message captured.";
      };

      const getAgentsFromHeartbeats = (heartbeats) => {
        const map = new Map();
        map.set("Human-Abe", { abe: "Human-Abe", display: "Human-Abe", host: "dashboard", lag: 0 });
        const now = Date.now() / 1000;
        heartbeats.forEach((hb) => {
          const data = hb?.data || {};
          const abe = data.abe;
          if (!abe) return;
          const rawTs = data.timestamp;
          const parsed = rawTs ? Number(rawTs) || Date.parse(rawTs) / 1000 : now;
          const timestamp = Number.isFinite(parsed) ? parsed : now;
          map.set(abe, {
            abe,
            display: data.display || abe,
            host: data.host || "unknown",
            lag: now - timestamp,
          });
        });
        return [...map.values()].sort((a, b) => a.display.localeCompare(b.display));
      };

      const parseAgentLabel = (agent = {}) => {
        const display = agent.display || agent.abe || "unknown";
        const match = display.match(/^(abe-\d+)\s*\(([^)]+)\)$/i);
        if (match) {
          return { name: match[2], designation: match[1] };
        }
        if (agent.abe && agent.abe !== display) {
          return { name: display, designation: agent.abe };
        }
        return { name: display, designation: agent.host || agent.abe || "unknown" };
      };

      const getAgentMap = (heartbeats) => {
        const map = new Map();
        getAgentsFromHeartbeats(heartbeats).forEach((agent) => {
          const label = parseAgentLabel(agent);
          map.set(agent.abe, { ...agent, ...label });
          map.set(agent.display, { ...agent, ...label });
          map.set(label.name, { ...agent, ...label });
        });
        return map;
      };

      const getAgentDisplay = (value, agentMap) => {
        const agent = agentMap.get(value);
        if (agent) return agent.name;
        const match = String(value || "").match(/^(abe-\d+)\s*\(([^)]+)\)$/i);
        return match ? match[2] : String(value || "unknown");
      };

      const getAgentInitials = (value, agentMap) => {
        const name = getAgentDisplay(value, agentMap);
        const words = name.split(/[\s_-]+/).filter(Boolean);
        if (words.length >= 2) return `${words[0][0]}${words[1][0]}`.toUpperCase();
        return name.slice(0, 2).toUpperCase();
      };

      const getStatusMeta = (entry) => {
        if (isErrorEntry(entry)) return { label: entry.status || entry.results?.status || "error", color: "#c78978" };
        if (entry.status === "completed") return { label: "completed", color: "var(--teal)" };
        if (entry.status === "pending") return { label: "pending", color: "var(--brass)" };
        if (entry.status) return { label: entry.status, color: "var(--muted)" };
        return { label: "logged", color: "var(--faint)" };
      };

      const getActionKey = (event) => {
        const entry = parseActionEntry(event);
        return entry.id || `${entry.agent || "unknown"}:${entry.action?.tool || "tool"}:${entry.timestamp_intent || event.id}`;
      };

      const streamIdValue = (id = "") => {
        const [ms = "0", seq = "0"] = String(id).split("-");
        return (Number(ms) || 0) * 10000 + (Number(seq) || 0);
      };

      const statusRank = (entry) => {
        if (isErrorEntry(entry)) return 4;
        if (entry.status === "completed") return 3;
        if (entry.status === "pending") return 1;
        return 2;
      };

      const compareActionPhase = (a, b) => {
        const timeCompare = (a.entry.timestamp_intent || "").localeCompare(b.entry.timestamp_intent || "");
        if (timeCompare !== 0) return timeCompare;
        const idCompare = streamIdValue(a.event.id) - streamIdValue(b.event.id);
        if (idCompare !== 0) return idCompare;
        return statusRank(a.entry) - statusRank(b.entry);
      };

      const groupActions = (actions) => {
        const groups = new Map();
        actions.forEach((event) => {
          const key = getActionKey(event);
          const entry = parseActionEntry(event);
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push({ event, entry });
        });
        return [...groups.entries()].map(([key, phases]) => {
          phases.sort(compareActionPhase);
          const latest = phases[phases.length - 1];
          return { key, phases, latest };
        }).sort((a, b) => compareActionPhase(a.latest, b.latest));
      };

      const agentAccent = (name = "") => {
        const palette = ["#ad9259", "#7fb7a7", "#b98776", "#8fa0b3", "#a38ab8", "#91a56f", "#c29476"];
        let hash = 0;
        for (let i = 0; i < name.length; i += 1) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
        return palette[hash % palette.length];
      };

      const parseParticipants = (raw) => {
        if (!raw) return [];
        if (Array.isArray(raw)) return raw;
        try {
          return JSON.parse(raw);
        } catch {
          try {
            return JSON.parse(raw.replace(/'/g, '"'));
          } catch {
            return [raw];
          }
        }
      };

      const SectionLabel = ({ children }) => (
        <div className="px-3 pb-2 pt-5 text-[11px] font-semibold uppercase tracking-[0.18em] muted">
          {children}
        </div>
      );

      const StatusDot = ({ connected }) => (
        <span
          className="inline-block h-2 w-2 rounded-full"
          style={{ background: connected ? "var(--teal)" : "var(--faint)" }}
        />
      );

      const Sidebar = ({ activeView, setActiveView, channels, identity, setIdentity, heartbeats, connected }) => {
        const agents = useMemo(() => getAgentsFromHeartbeats(heartbeats), [heartbeats]);
        const liveCount = agents.filter((agent) => agent.lag < 90).length;

        return (
          <aside className="surface flex h-full w-[300px] shrink-0 flex-col rounded-r-[10px] border-l-0 border-y-0">
            <div className="px-6 pb-5 pt-6">
              <div className="flex items-center justify-between">
                <div className="text-[22px] font-semibold tracking-[0.22em]">VOLITION</div>
                <div className="flex items-center gap-2 text-xs muted">
                  <StatusDot connected={connected} />
                  {connected ? "online" : "offline"}
                </div>
              </div>
              <div className="mt-5">
                <label className="mb-2 block text-[11px] font-semibold uppercase tracking-[0.16em] muted">
                  Identity
                </label>
                <input
                  value={identity}
                  onChange={(e) => setIdentity(e.target.value)}
                  className="field w-full rounded-md px-3 py-2 text-sm"
                  placeholder="Human-Abe"
                />
              </div>
            </div>

            <div className="border-t hairline px-3 pb-3">
              <SectionLabel>Comms</SectionLabel>
              <div className="space-y-1">
                {channels.map((channel) => (
                  <button
                    key={channel}
                    onClick={() => setActiveView(channel)}
                    className={`nav-item ${activeView === channel ? "nav-item-active" : ""} flex w-full items-center justify-between rounded-md px-3 py-2 text-sm`}
                  >
                    <span><span className="faint">#</span> {channel.replace("chat:", "")}</span>
                    {channel === "chat:synchronous" && <span className="text-[10px] muted">sync</span>}
                  </button>
                ))}
                <button
                  onClick={() => setActiveView("emails")}
                  className={`nav-item ${activeView === "emails" ? "nav-item-active" : ""} flex w-full items-center rounded-md px-3 py-2 text-sm`}
                >
                  <span className="faint mr-2">-></span> Uplink
                </button>
                <button
                  onClick={() => setActiveView("incidents")}
                  className={`nav-item ${activeView === "incidents" ? "nav-item-active" : ""} flex w-full items-center rounded-md px-3 py-2 text-sm`}
                >
                  <span className="faint mr-2">!</span> Issues
                </button>
              </div>
            </div>

            <div className="mt-2 flex min-h-0 flex-1 flex-col border-t hairline px-3 pb-4">
              <SectionLabel>Fleet</SectionLabel>
              <div className="mb-3 px-3 text-xs muted">{liveCount}/{agents.length} active</div>
              <div className="min-h-0 flex-1 overflow-y-auto scrollbar-thin">
                {agents.map((agent) => {
                  const isLive = agent.lag < 90;
                  const label = parseAgentLabel(agent);
                  return (
                    <button
                      key={agent.abe}
                      onClick={() => setActiveView(`agent:${agent.abe}`)}
                      className={`mb-1 flex w-full items-center justify-between rounded-md px-3 py-2 text-left hover:bg-white/[0.025] ${activeView === `agent:${agent.abe}` ? "nav-item-active" : ""}`}
                    >
                      <div className="min-w-0">
                        <div className="truncate text-sm font-medium">{label.name}</div>
                        <div className="truncate text-[11px] faint">{label.designation}</div>
                      </div>
                      <div className="flex items-center gap-2 text-[11px] muted">
                        <span>{isLive ? "live" : `${Math.round(agent.lag)}s`}</span>
                        <span className="h-2 w-2 rounded-full" style={{ background: isLive ? "var(--teal)" : "var(--faint)" }} />
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          </aside>
        );
      };

      const WorkspaceHeader = ({ title, subtitle, children }) => (
        <div className="flex min-h-[70px] items-center justify-between border-b hairline px-6">
          <div>
            <h1 className="text-lg font-semibold">{title}</h1>
            {subtitle && <div className="mt-1 text-xs muted">{subtitle}</div>}
          </div>
          {children}
        </div>
      );

      const ChatWindow = ({ channel, messages, onSend, identity }) => {
        const [input, setInput] = useState("");
        const inputRef = useRef(null);
        const bottomRef = useRef(null);
        const displayChannel = channel ? channel.replace("chat:", "") : "unknown";

        useEffect(() => {
          bottomRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [messages]);

        const handleSubmit = (event) => {
          event.preventDefault();
          if (!input.trim()) return;
          onSend(channel, input);
          setInput("");
          requestAnimationFrame(() => autoResize(inputRef.current));
        };

        const handleKeyDown = (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            handleSubmit(event);
          }
        };

        return (
          <main className="surface flex min-w-0 flex-1 flex-col rounded-[10px]">
            <WorkspaceHeader
              title={`#${displayChannel}`}
              subtitle={channel === "chat:synchronous" ? "Synchronous fleet channel" : "Shared fleet channel"}
            />
            <div className="min-h-0 flex-1 overflow-y-auto px-6 py-5 scrollbar-thin">
              <div className="mx-auto max-w-5xl space-y-1">
                {messages.map((message, index) => {
                  const data = message?.data || {};
                  const from = data.from || "Unknown";
                  const isMe = from === identity || from === "Human-Abe" || from === "Human";
                  const senderColor = isMe ? "var(--brass)" : agentAccent(from);
                  return (
                    <article key={message.id || index} className={`group grid grid-cols-[130px_minmax(0,1fr)] gap-4 rounded-md px-3 py-3 ${isMe ? "bg-[rgba(195,161,95,0.055)]" : "hover:bg-white/[0.018]"}`}>
                      <div className="text-right">
                        <div className="truncate text-sm font-semibold" style={{ color: senderColor }}>{from}</div>
                        <div className="mt-1 text-[11px] faint">{formatTime(data.timestamp, { seconds: true })}</div>
                      </div>
                      <div className="max-w-3xl whitespace-pre-wrap text-[15px] leading-7 text-[#dcd8cb]">{data.content}</div>
                    </article>
                  );
                })}
                {messages.length === 0 && (
                  <div className="py-24 text-center text-sm muted">No messages in this channel yet.</div>
                )}
                <div ref={bottomRef} />
              </div>
            </div>
            <form onSubmit={handleSubmit} className="border-t hairline p-4">
              <div className="mx-auto flex max-w-5xl items-end gap-3">
                <textarea
                  ref={inputRef}
                  value={input}
                  rows={1}
                  onChange={(event) => {
                    setInput(event.target.value);
                    autoResize(event.target);
                  }}
                  onKeyDown={handleKeyDown}
                  className="field max-h-44 min-h-[44px] flex-1 resize-none overflow-y-auto rounded-md px-4 py-3 text-sm scrollbar-thin"
                  placeholder={`Message #${displayChannel} as ${identity}`}
                />
                <button className="rounded-md px-4 py-3 text-sm font-semibold text-[#0c0f0e]" style={{ background: "var(--brass)" }}>
                  Send
                </button>
              </div>
            </form>
          </main>
        );
      };

      const EmailView = ({ actions, heartbeats, onSendEmail }) => {
        const [filter, setFilter] = useState("");
        const [composeTo, setComposeTo] = useState("");
        const [composeMsg, setComposeMsg] = useState("");
        const msgRef = useRef(null);
        const agents = useMemo(() => getAgentsFromHeartbeats(heartbeats), [heartbeats]);

        const emails = useMemo(() => {
          const seen = new Set();
          return [...actions]
            .reverse()
            .map((action) => {
              const entry = parseActionEntry(action);
              if (entry.action?.tool !== "email_send") return null;
              return {
                ...entry,
                streamId: action.id,
                recipient: entry.action.recipient || "",
                message: entry.action.message || "",
              };
            })
            .filter(Boolean)
            .filter((entry) => {
              const uniqueKey = entry.id || `${entry.timestamp_intent}-${entry.message}-${entry.streamId}`;
              if (seen.has(uniqueKey)) return false;
              seen.add(uniqueKey);
              if (!filter) return true;
              const haystack = [entry.agent, entry.recipient, entry.message].join(" ").toLowerCase();
              return haystack.includes(filter.toLowerCase());
            });
        }, [actions, filter]);

        const handleSend = (event) => {
          event.preventDefault();
          if (!composeTo.trim() || !composeMsg.trim()) return;
          onSendEmail(composeTo, composeMsg);
          setComposeMsg("");
          requestAnimationFrame(() => autoResize(msgRef.current));
        };

        return (
          <main className="surface flex min-w-0 flex-1 flex-col rounded-[10px]">
            <WorkspaceHeader title="Uplink" subtitle="Direct messages through Redis inboxes">
              <input
                value={filter}
                onChange={(event) => setFilter(event.target.value)}
                className="field w-72 rounded-md px-3 py-2 text-sm"
                placeholder="Search sent messages"
              />
            </WorkspaceHeader>

            <div className="grid min-h-0 flex-1 grid-cols-[360px_minmax(0,1fr)]">
              <form onSubmit={handleSend} className="border-r hairline p-5">
                <div className="text-sm font-semibold">Compose</div>
                <div className="mt-4 space-y-3">
                  <input
                    list="active-agents"
                    value={composeTo}
                    onChange={(event) => setComposeTo(event.target.value)}
                    className="field w-full rounded-md px-3 py-2 text-sm"
                    placeholder="abe-01, abe-02"
                  />
                  <datalist id="active-agents">
                    {agents.map((agent) => <option key={agent.abe} value={agent.abe}>{agent.display}</option>)}
                  </datalist>
                  <textarea
                    ref={msgRef}
                    value={composeMsg}
                    rows={8}
                    onChange={(event) => {
                      setComposeMsg(event.target.value);
                      autoResize(event.target);
                    }}
                    onKeyDown={(event) => {
                      if (event.key === "Enter" && !event.shiftKey) {
                        event.preventDefault();
                        handleSend(event);
                      }
                    }}
                    className="field max-h-72 min-h-40 w-full resize-none rounded-md px-3 py-2 text-sm scrollbar-thin"
                    placeholder="Message content"
                  />
                  <button className="w-full rounded-md px-4 py-2.5 text-sm font-semibold text-[#0c0f0e]" style={{ background: "var(--brass)" }}>
                    Send Uplink
                  </button>
                </div>
                <div className="mt-5 flex flex-wrap gap-2">
                  {agents.filter((agent) => agent.abe !== "Human-Abe").slice(0, 10).map((agent) => (
                    <button
                      key={agent.abe}
                      type="button"
                      onClick={() => setComposeTo(agent.abe)}
                      className="rounded-full border px-2.5 py-1 text-xs muted hover:text-[var(--text)]"
                      style={{ borderColor: "var(--line)" }}
                    >
                      {agent.display}
                    </button>
                  ))}
                </div>
              </form>

              <div className="min-h-0 overflow-y-auto p-5 scrollbar-thin">
                <div className="space-y-2">
                  {emails.map((email, index) => (
                    <article key={email.streamId || index} className="surface-raised rounded-md p-4">
                      <div className="flex items-center justify-between text-xs muted">
                        <div><span className="accent font-semibold">{email.agent}</span> <span className="faint">to</span> {email.recipient}</div>
                        <div>{formatTime(email.timestamp_intent)}</div>
                      </div>
                      <div className="mt-3 whitespace-pre-wrap text-sm leading-6 text-[#dcd8cb]">{email.message}</div>
                    </article>
                  ))}
                  {emails.length === 0 && <div className="py-24 text-center text-sm muted">No uplink messages found.</div>}
                </div>
              </div>
            </div>
          </main>
        );
      };

      const IssuesView = ({ events }) => {
        const [filterText, setFilterText] = useState("");
        const [filterAgent, setFilterAgent] = useState("all");
        const issues = useMemo(() => {
          const seen = new Map();
          events.forEach((event) => {
            const entry = parseActionEntry(event);
            if (!isErrorEntry(entry)) return;
            seen.set(entry.id || event.id, { event, entry });
          });
          return [...seen.values()].reverse();
        }, [events]);
        const agents = useMemo(() => [...new Set(issues.map(({ entry }) => entry.agent).filter(Boolean))].sort(), [issues]);
        const filtered = useMemo(() => {
          const needle = filterText.toLowerCase();
          return issues.filter(({ entry }) => {
            if (filterAgent !== "all" && entry.agent !== filterAgent) return false;
            if (!needle) return true;
            return [entry.agent, entry.status, entry.action?.tool, getErrorMessage(entry), entry.reasoning].join(" ").toLowerCase().includes(needle);
          });
        }, [issues, filterAgent, filterText]);

        return (
          <main className="surface flex min-w-0 flex-1 flex-col rounded-[10px]">
            <WorkspaceHeader title="Issues" subtitle={`${filtered.length} visible / ${issues.length} captured`}>
              <div className="flex gap-2">
                <select value={filterAgent} onChange={(event) => setFilterAgent(event.target.value)} className="field rounded-md px-3 py-2 text-sm">
                  <option value="all">All agents</option>
                  {agents.map((agent) => <option key={agent} value={agent}>{agent}</option>)}
                </select>
                <input
                  value={filterText}
                  onChange={(event) => setFilterText(event.target.value)}
                  className="field w-72 rounded-md px-3 py-2 text-sm"
                  placeholder="Search issues"
                />
              </div>
            </WorkspaceHeader>
            <div className="min-h-0 flex-1 overflow-y-auto p-5 scrollbar-thin">
              <div className="overflow-hidden rounded-md border hairline">
                <div className="grid grid-cols-[140px_150px_160px_minmax(0,1fr)] border-b hairline px-4 py-3 text-[11px] font-semibold uppercase tracking-[0.14em] muted">
                  <div>Time</div>
                  <div>Agent</div>
                  <div>Tool</div>
                  <div>Detail</div>
                </div>
                {filtered.map(({ event, entry }) => (
                  <article key={event.id} className="grid grid-cols-[140px_150px_160px_minmax(0,1fr)] border-b hairline px-4 py-4 text-sm last:border-b-0 hover:bg-white/[0.018]">
                    <div className="text-xs muted">{formatTime(entry.timestamp_intent)}</div>
                    <div className="font-semibold accent">{entry.agent || "unknown"}</div>
                    <div className="mono text-xs muted">{entry.action?.tool || "unknown_tool"}</div>
                    <div className="min-w-0">
                      <div className="whitespace-pre-wrap leading-6 text-[#dcd8cb]">{getErrorMessage(entry)}</div>
                      {entry.reasoning && !entry.reasoning.startsWith("Error:") && (
                        <div className="mt-2 border-l-2 pl-3 text-xs italic muted" style={{ borderColor: "var(--line)" }}>
                          {entry.reasoning}
                        </div>
                      )}
                    </div>
                  </article>
                ))}
                {filtered.length === 0 && <div className="py-24 text-center text-sm muted">No matching issues.</div>}
              </div>
            </div>
          </main>
        );
      };

      const ActionGroupCard = ({ group, compact = false }) => {
        const [expanded, setExpanded] = useState(false);
        const entry = group.latest.entry;
        const status = getStatusMeta(entry);
        const detail = entry.reasoning || entry.results?.message || entry.results?.error || JSON.stringify(entry.action || {});
        const actionJson = JSON.stringify(entry.action || {}, null, 2);

        return (
          <article className="border-b hairline pb-3 last:border-b-0">
            <button onClick={() => setExpanded(!expanded)} className="w-full text-left">
              <div className="flex items-start justify-between gap-3">
                <div className="min-w-0">
                  <div className="truncate text-sm font-semibold">{entry.agent || "unknown"}</div>
                  <div className="mono mt-1 truncate text-xs" style={{ color: status.color }}>
                    {entry.action?.tool || "unknown_tool"}
                  </div>
                </div>
                <div className="shrink-0 text-right">
                  <div className="text-[11px] faint">{formatTime(entry.timestamp_intent)}</div>
                  <div className="mt-1 text-[10px] uppercase tracking-[0.12em]" style={{ color: status.color }}>
                    {status.label}{group.phases.length > 1 ? ` / ${group.phases.length}` : ""}
                  </div>
                </div>
              </div>
              <div className={`${expanded || !compact ? "" : "line-clamp-3"} mt-2 text-xs leading-5 muted`}>
                {detail}
              </div>
            </button>
            {expanded && (
              <div className="mt-3 rounded-md border p-3" style={{ borderColor: "var(--line)", background: "#10130f" }}>
                <div className="mb-2 text-[11px] font-semibold uppercase tracking-[0.14em] muted">Phases</div>
                <div className="space-y-3">
                  {group.phases.map(({ event, entry: phase }) => {
                    const phaseStatus = getStatusMeta(phase);
                    return (
                      <div key={event.id} className="border-l-2 pl-3" style={{ borderColor: phaseStatus.color }}>
                        <div className="flex justify-between gap-3 text-[11px]">
                          <span className="uppercase tracking-[0.12em]" style={{ color: phaseStatus.color }}>{phaseStatus.label}</span>
                          <span className="faint">{formatTime(phase.timestamp_intent, { seconds: true })}</span>
                        </div>
                        {phase.reasoning && <div className="mt-1 whitespace-pre-wrap text-xs leading-5 muted">{phase.reasoning}</div>}
                        <pre className="mono mt-2 max-h-44 overflow-auto whitespace-pre-wrap rounded p-2 text-[11px] faint scrollbar-thin" style={{ background: "#0c0f0e" }}>
                          {JSON.stringify(phase.results || phase.action || {}, null, 2)}
                        </pre>
                      </div>
                    );
                  })}
                </div>
                <div className="mt-3 text-[11px] faint">Action: <span className="mono">{actionJson.slice(0, 260)}</span></div>
              </div>
            )}
          </article>
        );
      };

      const AgentView = ({ agentId, heartbeats, actions }) => {
        const agentMap = useMemo(() => getAgentMap(heartbeats), [heartbeats]);
        const agent = agentMap.get(agentId) || { abe: agentId, name: agentId, designation: agentId, host: "unknown" };
        const aliases = new Set([agentId, agent.abe, agent.display, agent.name, `${agent.abe} (${agent.name})`].filter(Boolean));
        const actionGroups = useMemo(() => {
          return groupActions(actions)
            .filter((group) => aliases.has(group.latest.entry.agent))
            .reverse();
        }, [actions, agentId, heartbeats]);
        const issueCount = actionGroups.filter((group) => isErrorEntry(group.latest.entry)).length;

        return (
          <main className="surface flex min-w-0 flex-1 flex-col rounded-[10px]">
            <WorkspaceHeader title={agent.name} subtitle={`${agent.designation} · ${agent.host || "unknown host"} · ${actionGroups.length} actions · ${issueCount} issues`} />
            <div className="grid min-h-0 flex-1 grid-cols-[260px_minmax(0,1fr)]">
              <div className="border-r hairline p-5">
                <div className="text-[11px] font-semibold uppercase tracking-[0.14em] muted">Status</div>
                <div className="mt-4 space-y-3 text-sm">
                  <div className="flex justify-between gap-4"><span className="muted">Designation</span><span>{agent.designation}</span></div>
                  <div className="flex justify-between gap-4"><span className="muted">Host</span><span className="truncate">{agent.host}</span></div>
                  <div className="flex justify-between gap-4"><span className="muted">Lag</span><span>{agent.lag < 90 ? "live" : `${Math.round(agent.lag || 0)}s`}</span></div>
                </div>
                <div className="mt-8 text-[11px] font-semibold uppercase tracking-[0.14em] muted">Available Now</div>
                <div className="mt-3 text-xs leading-5 muted">
                  This view uses the existing Redis heartbeat and action log only. Clipboard, priors, and local files would need a backend tool or agent-reported stream.
                </div>
              </div>
              <div className="min-h-0 overflow-y-auto p-5 scrollbar-thin">
                <div className="space-y-4">
                  {actionGroups.map((group) => <ActionGroupCard key={group.key} group={group} compact={false} />)}
                  {actionGroups.length === 0 && <div className="py-24 text-center text-sm muted">No actions captured for this Abe.</div>}
                </div>
              </div>
            </div>
          </main>
        );
      };

      const ActivityRail = ({ actions, digests, heartbeats }) => {
        const [tab, setTab] = useState("actions");
        const [collapsed, setCollapsed] = useState(true);
        const agentMap = useMemo(() => getAgentMap(heartbeats), [heartbeats]);
        const recentActions = useMemo(() => groupActions(actions).reverse().slice(0, 70), [actions]);
        const recentDigests = useMemo(() => [...digests].reverse().slice(0, 30), [digests]);

        return (
          <aside className="surface flex h-full w-[380px] shrink-0 flex-col rounded-[10px]">
            <div className="flex min-h-[70px] items-center justify-between border-b hairline px-4">
              <div>
                <div className="text-sm font-semibold">Activity</div>
                <div className="mt-1 text-xs muted">{tab === "actions" ? `${recentActions.length} grouped actions` : `${recentDigests.length} ambient digests`}</div>
              </div>
              <div className="flex items-center gap-2">
                {tab === "actions" && (
                  <button onClick={() => setCollapsed(!collapsed)} className="rounded border px-2 py-1 text-[11px] muted" style={{ borderColor: "var(--line)" }}>
                    {collapsed ? "compact" : "full"}
                  </button>
                )}
                <div className="surface-raised flex rounded-md p-1">
                  {["actions", "digests"].map((name) => (
                    <button
                      key={name}
                      onClick={() => setTab(name)}
                      className={`rounded px-3 py-1.5 text-xs ${tab === name ? "text-[#0c0f0e]" : "muted"}`}
                      style={{ background: tab === name ? "var(--brass)" : "transparent" }}
                    >
                      {name}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <div className="min-h-0 flex-1 overflow-y-auto p-4 scrollbar-thin">
              {tab === "actions" ? (
                <div className="space-y-3">
                  {recentActions.map((group) => <ActionGroupCard key={group.key} group={group} compact={collapsed} />)}
                </div>
              ) : (
                <div className="space-y-3">
                  {recentDigests.map((digest) => {
                    const data = digest.data || {};
                    const participants = parseParticipants(data.participants);
                    return (
                      <article key={digest.id} className="surface-raised rounded-md p-3">
                        <div className="mb-2 flex items-center justify-between text-[11px] muted">
                          <div className="flex -space-x-1.5">
                            {participants.slice(0, 8).map((participant, index) => (
                              <span key={`${participant}-${index}`} className="grid h-6 w-6 place-items-center rounded-full border text-[9px]" style={{ background: "var(--teal-soft)", borderColor: "var(--line)", color: "var(--teal)" }}>
                                {getAgentInitials(participant, agentMap)}
                              </span>
                            ))}
                          </div>
                          <span>{formatTime(data.generated_at)}</span>
                        </div>
                        <div className="text-xs italic leading-5 text-[#cbc7ba]">{data.summary}</div>
                        <div className="mt-3 flex justify-between text-[11px] faint">
                          <span>{data.msg_count || 0} messages</span>
                          <span>{Number(data.end_ts - data.start_ts || 0).toFixed(0)}s</span>
                        </div>
                      </article>
                    );
                  })}
                  {recentDigests.length === 0 && <div className="py-16 text-center text-sm muted">No digests yet.</div>}
                </div>
              )}
            </div>
          </aside>
        );
      };

      const App = () => {
        const [socket, setSocket] = useState(null);
        const [connected, setConnected] = useState(false);
        const [identity, setIdentity] = useState("Human-Abe");
        const [activeView, setActiveView] = useState("chat:general");
        const [channels, setChannels] = useState(["chat:general", "chat:synchronous"]);
        const [chats, setChats] = useState({});
        const [actions, setActions] = useState([]);
        const [digests, setDigests] = useState([]);
        const [heartbeats, setHeartbeats] = useState([]);

        useEffect(() => {
          let ws;
          let reconnectTimer;
          let closedByUnmount = false;

          const connect = () => {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            ws.onopen = () => setConnected(true);
            ws.onclose = () => {
              setConnected(false);
              if (!closedByUnmount) reconnectTimer = setTimeout(connect, 2000);
            };
            ws.onerror = () => {
              setConnected(false);
              ws.close();
            };
            ws.onmessage = (event) => {
              try {
                const msg = JSON.parse(event.data);
                if (msg.type === "channel_discovery") {
                  setChannels((prev) => {
                    if (prev.includes(msg.channel)) return prev;
                    const discovered = [...prev, msg.channel]
                      .filter((channel) => channel !== "chat:general" && channel !== "chat:synchronous")
                      .sort();
                    return ["chat:general", "chat:synchronous", ...discovered];
                  });
                  return;
                }
                if (msg.type !== "stream_event") return;
                if (msg.stream.startsWith("chat:")) {
                  setChats((prev) => ({
                    ...prev,
                    [msg.stream]: [...(prev[msg.stream] || []), msg].sort((a, b) => (a.data.timestamp || "").localeCompare(b.data.timestamp || "")),
                  }));
                } else if (msg.stream === "volition:action_log") {
                  setActions((prev) => {
                    if (prev.some((item) => item.id === msg.id)) return prev;
                    const sorted = [...prev, msg].sort((a, b) => {
                      const ta = parseActionEntry(a).timestamp_intent || "";
                      const tb = parseActionEntry(b).timestamp_intent || "";
                      const timeCompare = ta.localeCompare(tb);
                      if (timeCompare !== 0) return timeCompare;
                      return streamIdValue(a.id) - streamIdValue(b.id);
                    });
                    return sorted.slice(-1000);
                  });
                } else if (msg.stream === "volition:social_digests") {
                  setDigests((prev) => {
                    if (prev.some((item) => item.id === msg.id)) return prev;
                    return [...prev, msg].sort((a, b) => (a.data.generated_at || "").localeCompare(b.data.generated_at || ""));
                  });
                } else if (msg.stream === "volition:heartbeat") {
                  setHeartbeats((prev) => [...prev.slice(-140), msg]);
                }
              } catch (error) {
                console.error("Parse error on WS message:", error);
              }
            };
            setSocket(ws);
          };

          connect();
          return () => {
            closedByUnmount = true;
            clearTimeout(reconnectTimer);
            ws?.close();
          };
        }, []);

        const handleSendChat = (channel, content) => {
          socket?.send(JSON.stringify({
            action: "post",
            channel: channel.replace("chat:", ""),
            content,
            sender: identity,
          }));
        };

        const handleSendEmail = (target, content) => {
          socket?.send(JSON.stringify({
            action: "email",
            target,
            content,
            sender: identity,
          }));
        };

        return (
          <div className="app-shell flex h-full gap-3 p-3">
            <Sidebar
              activeView={activeView}
              setActiveView={setActiveView}
              channels={channels}
              identity={identity}
              setIdentity={setIdentity}
              heartbeats={heartbeats}
              connected={connected}
            />
            <div className="flex min-w-0 flex-1 gap-3">
              {activeView === "emails" ? (
                <EmailView actions={actions} heartbeats={heartbeats} onSendEmail={handleSendEmail} />
              ) : activeView === "incidents" ? (
                <IssuesView events={actions} />
              ) : activeView.startsWith("agent:") ? (
                <AgentView agentId={activeView.replace("agent:", "")} heartbeats={heartbeats} actions={actions} />
              ) : (
                <ChatWindow
                  channel={activeView}
                  messages={chats[activeView] || []}
                  onSend={handleSendChat}
                  identity={identity}
                />
              )}
              <ActivityRail actions={actions} digests={digests} heartbeats={heartbeats} />
            </div>
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      {% endraw %}
    </script>
  </body>
</html>
